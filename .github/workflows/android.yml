name: Android Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        # Пропускаем проверку версии JDK (не нужно, мы уже поставили 17)
        skip-jdk-check: true
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Get version name from tag
      id: get_version
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_tag=true" >> $GITHUB_OUTPUT
        else
          echo "version=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "is_tag=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Update version in build.gradle
      run: |
        VERSION_NAME="${{ steps.get_version.outputs.version }}"
        VERSION_CODE=$(date +%Y%m%d%H%M%S)
        if [[ "${{ steps.get_version.outputs.is_tag }}" == "true" ]]; then
          VERSION_CODE=$(echo "$VERSION_NAME" | awk -F. '{print $1*10000 + $2*100 + $3}')
        fi
        echo "Version: $VERSION_NAME ($VERSION_CODE)"
        
        sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/build.gradle
        sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" android/build.gradle
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
        
    - name: Build Debug APK
      run: ./gradlew android:assembleDebug
      
    - name: Build Release APK
      run: ./gradlew android:assembleRelease
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Shooter3D-debug-${{ steps.get_version.outputs.version }}
        path: android/build/outputs/apk/debug/*.apk
        if-no-files-found: error
        retention-days: 30
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Shooter3D-release-${{ steps.get_version.outputs.version }}
        path: android/build/outputs/apk/release/*.apk
        if-no-files-found: error
        retention-days: 30
        
    - name: Create GitHub Release
      if: steps.get_version.outputs.is_tag == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        body: |
          ## Shooter3D - Snow Shelter
          
          ### Что нового:
          - Автоматическая сборка через GitHub Actions
          - Поддержка автообновления
          
          ### Установка:
          1. Скачай APK ниже
          2. Разреши установку из неизвестных источников
          3. Установи и играй!
        files: |
          android/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Rename APK for manual build
      if: steps.get_version.outputs.is_tag == 'false'
      run: |
        cp android/build/outputs/apk/release/*.apk Shooter3D-${{ steps.get_version.outputs.version }}.apk 2>/dev/null || true
        cp android/build/outputs/apk/debug/*.apk Shooter3D-debug-${{ steps.get_version.outputs.version }}.apk 2>/dev/null || true
        
    - name: Upload manual build APK
      if: steps.get_version.outputs.is_tag == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: Shooter3D-${{ steps.get_version.outputs.version }}
        path: Shooter3D-*.apk
        if-no-files-found: warn
        retention-days: 30

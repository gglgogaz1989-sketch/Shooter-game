name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew android:assembleDebug
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v3
      with:
        name: Shooter3D-debug
        path: android/build/outputs/apk/debug/*.apk
        
    - name: Decode Keystore
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
      
    - name: Build Release APK
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: ./gradlew android:assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
    - name: Upload Release APK
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v3
      with:
        name: Shooter3D-release
        path: android/build/outputs/apk/release/*.apk
